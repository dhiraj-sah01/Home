<!DOCTYPE html>
<html>
<head>
  <title>Smart Relay Login</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      color: white;

      /* Animated gradient */
      background: linear-gradient(270deg, #667eea, #764ba2, #6a11cb);
      background-size: 600% 600%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Glass card */
    .login-box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 260px;

      /* Entrance animation */
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
      transition: 0.2s;
    }

    /* Input focus glow */
    input:focus {
      box-shadow: 0 0 10px #00ffcc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      color: white;
      transition: 0.2s;
    }

    /* Button hover + click */
    button:hover {
      background: rgba(255,255,255,0.3);
    }

    button:active {
      transform: scale(0.95);
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Smart Relay</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAGfYDl4b5cKGyUYDbtYEhIg5-V332R-Ag",
  authDomain: "bol-bam-seller-mill.firebaseapp.com",
  databaseURL: "https://bol-bam-seller-mill.firebaseio.com/",
  projectId: "bol-bam-seller-mill",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  document.getElementById("status").innerText = "Logging in...";

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "home.html";
    })
    .catch(() => {
      document.getElementById("status").innerText = "Login Failed";
    });
};
</script>

</body>
</html>
